<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth App</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

    <h1 class="text-3xl font-bold text-center mb-6">
      Authentication App
    </h1>

    <!-- REGISTER -->
    <div class="mb-10">

      <h2 class="text-xl font-semibold mb-4">
        Register
      </h2>

      <form id="registerForm" class="space-y-4">

        <input
          type="text"
          id="registerUsername"
          placeholder="Username"
          class="w-full border p-3 rounded-lg"
          required
        />

        <input
          type="email"
          id="registerEmail"
          placeholder="Email"
          class="w-full border p-3 rounded-lg"
          required
        />

        <input
          type="password"
          id="registerPassword"
          placeholder="Password"
          class="w-full border p-3 rounded-lg"
          required
        />

        <button
          type="submit"
          id="registerBtn"
          class="w-full bg-blue-600 text-white p-3 rounded-lg"
        >
          Register
        </button>

      </form>

      <p id="registerMessage" class="mt-3"></p>
    </div>

    <!-- LOGIN -->
    <div>

      <h2 class="text-xl font-semibold mb-4">
        Login
      </h2>

      <form id="loginForm" class="space-y-4">

        <input
          type="text"
          id="loginUsername"
          placeholder="Username"
          class="w-full border p-3 rounded-lg"
          required
        />

        <input
          type="password"
          id="loginPassword"
          placeholder="Password"
          class="w-full border p-3 rounded-lg"
          required
        />

        <button
          type="submit"
          id="loginBtn"
          class="w-full bg-green-600 text-white p-3 rounded-lg"
        >
          Login
        </button>

      </form>

      <p id="loginMessage" class="mt-3"></p>

    </div>

    <!-- PROFILE -->
    <div id="profileSection" class="hidden mt-8 border-t pt-5">

      <h2 class="text-xl font-semibold mb-4">
        Current User
      </h2>

      <p>
        <strong>Username:</strong>
        <span id="profileUsername"></span>
      </p>

      <p>
        <strong>Email:</strong>
        <span id="profileEmail"></span>
      </p>

      <p>
        <strong>Role:</strong>
        <span id="profileRole"></span>
      </p>

      <button
        id="logoutBtn"
        class="mt-5 bg-red-600 text-white px-5 py-2 rounded-lg"
      >
        Logout
      </button>

    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
